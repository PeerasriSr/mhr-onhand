<div class="display">
    <div class=container4>
      <div class="card">
        <div class="center pl-4 pr-4 mt-4 mb-4">
          <img src="/OnHand/assets/onhand-logo.png">       
          <!-- <img src="/assets/onhand-logo.png">        -->
          <p class="h2">ONHAND</p>
          <p class="h4 mt-2">โรงพยาบาลมหาราช นครราชสีมา</p>
          <form [formGroup]="inputGroup" (ngSubmit)="submitInput()">
            <div class="mt-4 left">
              <label for="InputID" class="form-label"><i class="fa fa-user" aria-hidden="true"></i> ชื่อผู้ใช้</label>
              <input type="id" class="form-control" formControlName="id">
            </div>
            <div class="mt-2 left">
              <label for="InputPassword" class="form-label"><i class="fa fa-unlock-alt" aria-hidden="true"></i>
                รหัสผ่าน</label>
              <input type="password" class="form-control" formControlName="password">
            </div>
            <div class="mt-2 left">
              <label for=""><i class="fa fa-map-marker" aria-hidden="true"></i> ตำแหน่ง</label>
              <select class="form-select" aria-label="Default select example" #cricket (change)="selectDep($event)">
                <option *ngFor="let x of listDep" [value]="x.ID">
                  {{x.Name}}
                </option>
              </select>
            </div>
            <div class="d-grid gap-2 mt-4">
              <button type="submit" class="btn btn-primary form-group">เข้าสู่ระบบ</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
